<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Steam Clone</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===================== -->
<!-- LOGIN -->
<!-- ===================== -->
<div id="authScreen" class="auth">

  <div class="authBox">
    <h1>🎮 Steam Clone</h1>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>

    <p id="authMsg"></p>
  </div>

</div>

<!-- ===================== -->
<!-- APP -->
<!-- ===================== -->
<div id="launcher" class="app hidden">

  <aside class="sidebar">
    <h2>STEAM 2D</h2>

    <input id="search" placeholder="Buscar juegos...">

    <h4>Géneros</h4>
    <p class="genre active" data-genre="all">Todos</p>
    <p class="genre" data-genre="arcade">Arcade</p>
    <p class="genre" data-genre="clasicos">Clásicos</p>
  </aside>

  <main>
    <h1>Biblioteca</h1>
    <div id="games" class="grid"></div>
  </main>

</div>

<!-- ===================== -->
<!-- GAME SCREEN -->
<!-- ===================== -->
<div id="gameScreen">
  <div id="ui">
    <button onclick="back()">⬅ Volver</button>
    <h2 id="title"></h2>
  </div>
  <canvas id="game"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
