<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VaporForge | Indie Gaming Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="authScreen" class="auth">
    <div class="authBox">
        <h1>⚡ VaporForge</h1>
        <p class="subtitle">Accede a la forja de videojuegos</p>

        <input id="user" placeholder="Nombre de usuario">
        <input id="pass" type="password" placeholder="Contraseña de seguridad">

        <div class="auth-buttons">
            <button onclick="login()" class="btn-primary">Iniciar Sesión</button>
            <button onclick="signup()" class="btn-secondary">Registrarse</button>
        </div>

        <p id="authMsg"></p>
    </div>
</div>

<div id="launcher" class="app hidden">

    <aside class="sidebar">
        <h2>VAPORFORGE</h2>
        <div class="user-status">● En línea</div>

        <input id="search" placeholder="Buscar en la biblioteca...">

        <h4>Categorías</h4>
        <p class="genre active" data-genre="all">🎮 Todos los títulos</p>
        <p class="genre" data-genre="arcade">🕹️ Arcade</p>
        <p class="genre" data-genre="clasicos">👾 Clásicos Retro</p>

        <!-- ✅ BOTÓN NUEVO (CREAR JUEGO) -->
        <button id="createGameBtn" class="create-btn" style="display:none;">
            ➕ Crear Juego
        </button>
    </aside>

    <main>
        <header class="main-header">
            <h1>Mi Biblioteca</h1>
            <span class="game-count">Explora tus mundos</span>
        </header>
        <div id="games" class="grid"></div>
    </main>

</div>

<!-- ===================== -->
<!-- GAME SCREEN -->
<!-- ===================== -->

<div id="gameScreen">
    <div id="ui">
        <button onclick="back()" class="btn-back">⬅ Salir del juego</button>
        <h2 id="title"></h2>
    </div>
    <canvas id="game"></canvas>
</div>

<!-- ===================== -->
<!-- MODAL CREAR JUEGO -->
<!-- ===================== -->

<div id="createGameModal" class="modal hidden">

    <div class="modal-box">

        <h2>🎮 Crear Juego</h2>

        <input id="gameName" placeholder="Nombre del juego">

        <select id="gameType">
            <option value="">Tipo de juego</option>
            <option value="arcade">Arcade</option>
            <option value="clasicos">Clásico</option>
            <option value="plataformas">Plataformas</option>
            <option value="shooter">Shooter</option>
        </select>

        <textarea id="gameDesc" placeholder="Descripción del juego"></textarea>

        <div class="file-section">
            <label>📁 Archivos del juego</label>
            <input id="gameFiles" type="file" multiple>
        </div>

        <button id="submitGameBtn">
            ✅ Formulario rellenado
        </button>

        <button id="closeModalBtn">
            ❌ Cerrar
        </button>

    </div>

</div>

<div id="createGameModal" class="modal hidden">

  <div class="modal-box">

    <h2>🎮 Crear juego</h2>

    <input id="gameName" placeholder="Nombre del juego">

    <select id="gameType">
      <option value="">Tipo de juego</option>
      <option value="arcade">Arcade</option>
      <option value="clasicos">Clásico</option>
      <option value="plataformas">Plataformas</option>
      <option value="shooter">Shooter</option>
    </select>

    <button id="submitGameBtn">
      ✅ Formulario rellenado
    </button>

    <button id="closeModalBtn">
      ❌ Cerrar
    </button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
